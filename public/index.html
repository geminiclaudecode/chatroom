<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>口袋树洞</title>
  <style>
    /* ========== 全局重置 ========== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 80% 20%, #1e1b4b, #090514);
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ================================================================
       昵称输入覆盖层 — 深色毛玻璃遮罩
       ================================================================ */
    .nickname-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(9, 5, 20, 0.75);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nickname-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .nickname-card {
      width: 92%;
      max-width: 400px;
      padding: 48px 36px 40px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 22px;
      text-align: center;
      animation: cardAppear 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardAppear {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .nickname-card .icon-row {
      font-size: 44px;
      margin-bottom: 20px;
    }

    .nickname-card h1 {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .nickname-card .subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .nickname-card .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .nickname-card input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      text-align: center;
      outline: none;
      letter-spacing: -0.01em;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nickname-card input::placeholder {
      color: rgba(255, 255, 255, 0.3);
      font-size: 14px;
    }

    .nickname-card input:focus {
      background: rgba(0, 0, 0, 0.5);
      border-color: rgba(255, 255, 255, 0.25);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.04);
    }

    .nickname-card .btn-row {
      display: flex;
      gap: 10px;
    }

    .nickname-card .btn {
      flex: 1;
      padding: 13px 20px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .nickname-card .btn-random {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .nickname-card .btn-random:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .nickname-card .btn-join {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #ffffff;
      box-shadow: 0 4px 14px rgba(37, 99, 235, 0.35);
    }

    .nickname-card .btn-join:hover {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
    }

    .nickname-card .btn:active {
      transform: scale(0.97);
    }

    .nickname-card .hint {
      margin-top: 20px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.3);
      line-height: 1.5;
    }

    /* ================================================================
       聊天主界面 — 液态玻璃大容器
       ================================================================ */
    .chat-app {
      position: relative;
      z-index: 1;
      width: 92%;
      max-width: 520px;
      height: calc(100vh - 32px);
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.2s;
    }

    .chat-app.visible {
      opacity: 1;
    }

    /* ---------- 顶部状态栏 ---------- */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: rgba(255, 255, 255, 0.03);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }

    .status-identity {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 500;
    }

    .status-identity .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #34c759;
      box-shadow: 0 0 8px rgba(52, 199, 89, 0.5);
    }

    .nickname-highlight {
      color: #ffffff;
      font-weight: 700;
    }

    .online-badge {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.45);
    }

    /* ---------- 消息滚动区 — 完全透明 ---------- */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
      background: transparent;
    }

    .messages-area::-webkit-scrollbar {
      width: 4px;
    }

    .messages-area::-webkit-scrollbar-track {
      background: transparent;
    }

    .messages-area::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
    }

    .messages-area::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    /* 消息气泡 — 通用 */
    .msg-wrapper {
      display: flex;
      flex-direction: column;
      animation: fadeSlideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg-meta {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 4px;
      padding-left: 10px;
    }

    .msg-meta .msg-nickname {
      color: rgba(255, 255, 255, 0.5);
      font-weight: 600;
    }

    .msg-meta .msg-time {
      margin-left: 6px;
      color: rgba(255, 255, 255, 0.25);
    }

    .msg-bubble {
      display: inline-block;
      max-width: 72%;
      padding: 12px 18px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.5;
      word-break: break-word;
      letter-spacing: -0.01em;
    }

    /* 他人消息气泡 — 淡白玻璃 */
    .msg-wrapper:not(.is-me):not(.system) .msg-bubble {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.9);
    }

    /* 自己发送的消息 — 蓝色偏光玻璃 */
    .msg-wrapper.is-me {
      align-items: flex-end;
    }

    .msg-wrapper.is-me .msg-meta {
      padding-left: 0;
      padding-right: 10px;
      text-align: right;
    }

    .msg-wrapper.is-me .msg-meta .msg-nickname {
      color: rgba(147, 197, 253, 0.7);
    }

    .msg-wrapper.is-me .msg-bubble {
      background: rgba(37, 99, 235, 0.25);
      border: 1px solid rgba(37, 99, 235, 0.4);
      color: #ffffff;
    }

    /* 系统消息居中 */
    .msg-wrapper.system {
      align-items: center;
      text-align: center;
    }

    .msg-wrapper.system .msg-bubble {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.3);
      font-size: 12px;
      padding: 6px 16px;
    }

    .msg-wrapper.system .msg-meta {
      display: none;
    }

    /* ---------- 底部输入区 ---------- */
    .input-area {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.03);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }

    .input-area input {
      flex: 1;
      padding: 11px 18px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      color: #fff;
      font-size: 15px;
      outline: none;
      letter-spacing: -0.01em;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .input-area input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .input-area input:focus {
      background: rgba(0, 0, 0, 0.45);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.04);
    }

    .input-area button {
      padding: 11px 22px;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border: none;
      border-radius: 24px;
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .input-area button:hover {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
    }

    .input-area button:active {
      transform: scale(0.96);
    }

    /* ================================================================
       移动端适配
       ================================================================ */
    @media (max-width: 480px) {
      .chat-app {
        width: 94%;
        height: calc(100vh - 16px);
        border-radius: 18px;
      }

      .nickname-card {
        width: 94%;
        padding: 40px 24px 32px;
      }

      .msg-bubble {
        max-width: 82%;
      }

      .status-bar {
        padding: 12px 16px;
      }

      .input-area {
        padding: 10px 16px;
      }

      .messages-area {
        padding: 16px;
      }
    }
  </style>
</head>
<body>

  <!-- ================================================================
  昵称输入覆盖层
  ================================================================ -->
  <div class="nickname-overlay" id="nicknameOverlay">
    <div class="nickname-card">
      <div class="icon-row">🌍</div>
      <h1>口袋树洞</h1>
      <p class="subtitle">输入昵称，和来自世界各地的朋友<br>一起聊天</p>
      <div class="input-group">
        <input
          type="text"
          id="nicknameInput"
          placeholder="你的昵称（留空则随机分配）"
          maxlength="20"
          autocomplete="off"
        />
      </div>
      <div class="btn-row">
        <button class="btn btn-random" id="randomBtn">随机昵称</button>
        <button class="btn btn-join" id="joinBtn">进入聊天室</button>
      </div>
      <p class="hint">文明聊天，友善交流</p>
    </div>
  </div>

  <!-- ================================================================
  聊天主界面
  ================================================================ -->
  <div class="chat-app" id="chatApp">
    <!-- 顶部状态栏 -->
    <div class="status-bar">
      <div class="status-identity">
        <span class="dot"></span>
        <span>你好，<strong class="nickname-highlight" id="myName">...</strong></span>
      </div>
      <div class="online-badge">
        在线 <span class="num" id="onlineCount">0</span> 人
      </div>
    </div>

    <!-- 消息滚动区 -->
    <div class="messages-area" id="messagesArea"></div>

    <!-- 底部输入区 -->
    <div class="input-area">
      <input
        type="text"
        id="messageInput"
        placeholder="说点什么…"
        maxlength="500"
      />
      <button id="sendBtn">发送</button>
    </div>
  </div>

  <!-- Socket.io CDN -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    (function () {
      // ----- DOM 引用 -----
      const nicknameOverlay = document.getElementById('nicknameOverlay');
      const nicknameInput   = document.getElementById('nicknameInput');
      const randomBtn       = document.getElementById('randomBtn');
      const joinBtn         = document.getElementById('joinBtn');

      const chatApp     = document.getElementById('chatApp');
      const myNameEl    = document.getElementById('myName');
      const onlineEl    = document.getElementById('onlineCount');
      const msgArea     = document.getElementById('messagesArea');
      const msgInput    = document.getElementById('messageInput');
      const sendBtn     = document.getElementById('sendBtn');

      // ----- 花名池（用于随机昵称按钮）-----
      const FLOWER_NAMES = [
        '凌晨三点的猫', '迷路的向日葵', '宇宙边缘的宇航员',
        '失眠的鲸鱼', '月亮背面的兔子', '深海里的萤火虫',
        '第七次日落', '北极星的眼泪', '会飞的金鱼',
        '雨中跳舞的刺猬', '黄昏便利店', '银河铁道乘务员',
        '星尘收集者', '樱花飘落的速度', '风居住的街道',
        '被遗忘的邮筒', '云朵上的面包师', '旧唱片里的杂音',
        '半糖去冰的月亮', '平行世界的另一个我'
      ];

      let myNickname = '';
      const socket = io();

      // ----- 连接成功后不可见，直到用户点击"进入聊天室" -----

      // 随机昵称按钮
      randomBtn.addEventListener('click', () => {
        const name = FLOWER_NAMES[Math.floor(Math.random() * FLOWER_NAMES.length)];
        nicknameInput.value = name;
        nicknameInput.focus();
        nicknameInput.select();
      });

      // 进入聊天室
      function joinChat() {
        const raw = nicknameInput.value.trim();

        // 禁用按钮防止重复点击
        joinBtn.disabled = true;
        joinBtn.textContent = '正在进入…';
        nicknameInput.disabled = true;

        // 发送 join 事件（服务器收到后返回 welcome）
        socket.emit('join', { nickname: raw });
      }

      joinBtn.addEventListener('click', joinChat);
      nicknameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          joinChat();
        }
      });

      // 自动聚焦昵称输入框
      nicknameInput.focus();

      // ----- Socket.io 事件处理 -----

      // 收到欢迎包（自己的昵称）
      socket.on('welcome', (data) => {
        myNickname = data.nickname;
        myNameEl.textContent = myNickname;
        onlineEl.textContent = data.usedCount;
        document.title = `${myNickname} | 口袋树洞`;

        // 昵称已确认，切换到聊天界面
        nicknameOverlay.classList.add('hidden');
        chatApp.classList.add('visible');

        // 聚焦输入框
        setTimeout(() => msgInput.focus(), 400);
      });

      // 在线人数更新
      socket.on('onlineCount', (data) => {
        onlineEl.textContent = data.count;
      });

      // 收到消息
      socket.on('message', (msg) => {
        appendMessage(msg);
      });

      // ----- 渲染消息到界面 -----
      function appendMessage(msg) {
        const wrapper = document.createElement('div');
        wrapper.className = 'msg-wrapper' + (msg.type === 'system' ? ' system' : '');

        // 自己发的消息加 is-me 样式
        const isMe = msg.type === 'chat' && msg.nickname === myNickname;
        if (isMe) {
          wrapper.classList.add('is-me');
        }

        if (msg.type === 'system') {
          wrapper.innerHTML = `<div class="msg-bubble">${escapeHtml(msg.content)}</div>`;
        } else {
          // 自己的消息显示"你"，别人的消息显示对方昵称
          const displayName = isMe ? '你' : escapeHtml(msg.nickname);
          wrapper.innerHTML = `
            <div class="msg-meta">
              <span class="msg-nickname">${displayName}</span>
              <span class="msg-time">${escapeHtml(msg.time)}</span>
            </div>
            <div class="msg-bubble">${escapeHtml(msg.content)}</div>
          `;
        }

        msgArea.appendChild(wrapper);
        msgArea.scrollTop = msgArea.scrollHeight;
      }

      // ----- 发送逻辑 -----
      function sendMessage() {
        const content = msgInput.value.trim();
        if (!content) return;
        socket.emit('chatMessage', { content });
        msgInput.value = '';
        msgInput.focus();
      }

      // 点击发送
      sendBtn.addEventListener('click', sendMessage);

      // 回车发送
      msgInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          sendMessage();
        }
      });

      // ----- 转义 HTML 防 XSS -----
      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

    })();
  </script>
</body>
</html>
