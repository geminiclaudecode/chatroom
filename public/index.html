<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>口袋树洞</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0c10;
      color: #e5e7eb;
      height: 100vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .nickname-overlay {
      position: fixed; inset: 0; z-index: 100;
      display: flex; align-items: center; justify-content: center;
      background: rgba(10, 10, 15, 0.8);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .nickname-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .nickname-overlay.fade-out { opacity: 0 !important; transform: translateY(30px) !important; pointer-events: none; }

    .nickname-card {
      width: 92%; max-width: 400px; padding: 48px 40px 40px;
      background: rgba(30, 30, 40, 0.9);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 16px;
      text-align: center;
    }

    .logo-sphere {
      width: 56px; height: 56px; margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(5,150,105,0.4) 0%, rgba(2,132,199,0.35) 50%, rgba(29,78,216,0.3) 100%);
      border: 1px solid rgba(255,255,255,0.15);
    }

    .nickname-card h1 { font-size:26px; font-weight:700; color:rgba(255,255,255,0.85); margin-bottom:8px; }
    .nickname-card .subtitle { font-size:14px; color:rgba(255,255,255,0.45); margin-bottom:32px; }
    .nickname-card .input-group { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
    .nickname-card input {
      width:100%; padding:14px 18px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.12);
      border-radius:12px; color:rgba(255,255,255,0.85); font-size:16px; text-align:center;
      outline:none; transition:border-color 0.3s;
    }
    .nickname-card input::placeholder { color:rgba(255,255,255,0.3); font-size:14px; }
    .nickname-card input:focus { border-color:rgba(16,185,129,0.4); }
    .nickname-card .btn-row { display:flex; gap:10px; }
    .nickname-card .btn {
      flex:1; padding:13px 20px; border:none; border-radius:12px; font-size:15px; font-weight:600;
      cursor:pointer; transition:background 0.2s;
    }
    .nickname-card .btn-random { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.75); border:1px solid rgba(255,255,255,0.1); }
    .nickname-card .btn-random:hover { background:rgba(255,255,255,0.15); }
    .nickname-card .btn-join { background:#0f4c3a; color:#fff; }
    .nickname-card .btn-join:hover { background:#0a3528; }
    .nickname-card .hint { margin-top:16px; font-size:12px; color:rgba(255,255,255,0.25); }

    .chat-app {
      position:relative; z-index:1; display:flex; flex-direction:column; height:100vh;
      background: rgba(20, 20, 30, 0.85);
      opacity:0; transition:opacity 0.4s ease 0.2s;
    }
    .chat-app.visible { opacity:1; }

    .status-bar { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; background:transparent; border-bottom:1px solid rgba(255,255,255,0.06); flex-shrink:0; }
    .status-identity { display:flex; align-items:center; gap:8px; font-size:15px; color:rgba(255,255,255,0.7); }
    .status-identity .dot { width:8px; height:8px; border-radius:50%; background:#34c759; }
    .nickname-highlight { color:#6b9080; font-weight:700; }
    .online-badge { font-size:13px; color:rgba(255,255,255,0.4); }

    .messages-area { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:10px; background:transparent; }
    .messages-area::-webkit-scrollbar { width:4px; }
    .messages-area::-webkit-scrollbar-track { background:transparent; }
    .messages-area::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:10px; }

    .msg-wrapper { display:flex; flex-direction:column; position:relative; }
    .msg-meta { font-size:12px; color:rgba(255,255,255,0.35); margin-bottom:4px; padding-left:10px; }
    .msg-meta .msg-nickname { color:rgba(255,255,255,0.5); font-weight:600; }
    .msg-meta .msg-time { margin-left:6px; color:rgba(255,255,255,0.25); }
    .msg-bubble { display:inline-block; max-width:72%; padding:12px 16px; border-radius:16px; font-size:15px; line-height:1.5; word-break:break-word; position:relative; }
    .msg-wrapper:not(.is-me):not(.system) .msg-bubble { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); color:#d1d5db; }
    .msg-wrapper.is-me { align-items:flex-end; }
    .msg-wrapper.is-me .msg-meta { padding-left:0; padding-right:10px; text-align:right; }
    .msg-wrapper.is-me .msg-bubble { background:rgba(16,185,129,0.15); border:1px solid rgba(16,185,129,0.25); color:#fff; }
    .msg-wrapper.system { align-items:center; text-align:center; }
    .msg-wrapper.system .msg-bubble { background:rgba(255,255,255,0.04); border-radius:10px; color:rgba(255,255,255,0.3); font-size:12px; padding:6px 14px; }
    .msg-wrapper.system .msg-meta { display:none; }

    .badge-count {
      position:absolute; top:-6px; right:-6px;
      min-width:18px; height:18px; padding:0 5px;
      border-radius:9px; background:rgba(16,185,129,0.3);
      color:rgba(255,255,255,0.8); font-size:10px; font-weight:700;
      display:none; align-items:center; justify-content:center;
      pointer-events:none; z-index:3;
    }
    .badge-count.show { display:flex; }

    .action-popup-menu {
      position:fixed; z-index:200;
      display:flex; gap:4px; padding:6px 8px;
      background:rgba(30,30,45,0.95);
      border:1px solid rgba(255,255,255,0.12); border-radius:12px;
      opacity:0; transform:scale(0.9); pointer-events:none;
      transition:opacity 0.15s ease,transform 0.15s ease;
    }
    .action-popup-menu.show { opacity:1; transform:scale(1); pointer-events:auto; }
    .action-popup-menu button {
      padding:6px 12px; border:none; border-radius:8px;
      background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.7);
      font-size:13px; cursor:pointer; white-space:nowrap;
    }
    .action-popup-menu button:hover { background:rgba(16,185,129,0.2); color:#fff; }

    .input-area { display:flex; align-items:center; gap:10px; padding:12px 24px; background:transparent; flex-shrink:0; }
    .input-area input {
      flex:1; padding:11px 16px;
      background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
      border-radius:20px; color:#fff; font-size:15px; outline:none;
      transition:border-color 0.3s;
    }
    .input-area input::placeholder { color:rgba(255,255,255,0.3); }
    .input-area input:focus { border-color:rgba(16,185,129,0.4); }
    .input-area button {
      padding:10px 20px;
      background:#0f4c3a; border:none; border-radius:20px;
      color:#fff; font-size:14px; font-weight:600; cursor:pointer;
      transition:background 0.2s; flex-shrink:0;
    }
    .input-area button:hover { background:#0a3528; }

    .emoji-trigger-btn {
      width:38px; height:38px; border-radius:50%;
      background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1);
      color:rgba(255,255,255,0.55); font-size:16px;
      cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0;
      transition:background 0.2s; user-select:none;
    }
    .emoji-trigger-btn:hover { background:rgba(255,255,255,0.12); color:#fff; }

    .emoji-panel { position:absolute; bottom:64px; left:24px; display:none; flex-wrap:wrap; gap:4px; padding:8px 10px; background:rgba(30,30,45,0.95); border:1px solid rgba(255,255,255,0.1); border-radius:12px; z-index:10; }
    .emoji-panel.show { display:flex; }
    .emoji-panel .emoji-item { width:36px; height:36px; border:none; border-radius:8px; background:transparent; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .emoji-panel .emoji-item:hover { background:rgba(255,255,255,0.1); }

    @media (max-width:480px) {
      .nickname-card { width:94%; padding:36px 20px 32px; }
      .msg-bubble { max-width:82%; }
      .status-bar { padding:10px 14px; }
      .input-area { padding:10px 14px; }
      .messages-area { padding:14px; }
    }
  </style>
</head>
<body>

  <div class="nickname-overlay" id="nicknameOverlay">
    <div class="nickname-card">
      <div class="logo-sphere"></div>
      <h1>口袋树洞</h1>
      <p class="subtitle">输入昵称，和来自世界各地的朋友<br>一起聊天</p>
      <div class="input-group">
        <input type="text" id="nicknameInput" placeholder="你的昵称（留空则随机分配）" maxlength="20" autocomplete="off" />
      </div>
      <div class="btn-row">
        <button class="btn btn-random" id="randomBtn">随机昵称</button>
        <button class="btn btn-join" id="joinBtn">进入聊天室</button>
      </div>
      <p class="hint">文明聊天，友善交流</p>
    </div>
  </div>

  <div class="chat-app" id="chatApp">
    <div class="status-bar">
      <div class="status-identity">
        <span class="dot"></span>
        <span>你好，<strong class="nickname-highlight" id="myName">...</strong></span>
      </div>
      <div class="online-badge">在线 <span class="num" id="onlineCount">0</span> 人</div>
    </div>
    <div class="messages-area" id="messagesArea"></div>
    <div class="input-area">
      <button class="emoji-trigger-btn" id="coffeeBtn" title="递咖啡">☕</button>
      <button class="emoji-trigger-btn" id="emojiBtn" title="表情">😊</button>
      <input type="text" id="messageInput" placeholder="说点什么…" maxlength="500" />
      <button id="sendBtn">发送</button>
    </div>
    <div class="emoji-panel" id="emojiPanel">
      <button class="emoji-item">🌲</button><button class="emoji-item">🪐</button>
      <button class="emoji-item">🌙</button><button class="emoji-item">☕</button>
      <button class="emoji-item">🤍</button><button class="emoji-item">🫂</button>
      <button class="emoji-item">✨</button><button class="emoji-item">😂</button>
    </div>
  </div>

  <div class="action-popup-menu" id="actionMenu">
    <button data-type="like">👍 赞一个</button>
    <button data-type="hug">🫂 抱抱他</button>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    (function(){
      const nicknameOverlay=document.getElementById('nicknameOverlay'),nicknameInput=document.getElementById('nicknameInput'),randomBtn=document.getElementById('randomBtn'),joinBtn=document.getElementById('joinBtn');
      const chatApp=document.getElementById('chatApp'),myNameEl=document.getElementById('myName'),onlineEl=document.getElementById('onlineCount'),msgArea=document.getElementById('messagesArea'),msgInput=document.getElementById('messageInput'),sendBtn=document.getElementById('sendBtn');
      const actionMenu=document.getElementById('actionMenu');
      let currentMenuMsgId=null;

      function hideMenu(){actionMenu.classList.remove('show');currentMenuMsgId=null;}
      function showMenu(x,y,msgId){
        hideMenu();currentMenuMsgId=msgId;
        const mw=actionMenu.offsetWidth||120,mh=actionMenu.offsetHeight||40;
        let px=x,py=y-mh-8;
        if(px+mw>window.innerWidth-10)px=window.innerWidth-mw-10;
        if(px<10)px=10;if(py<10)py=y+20;
        actionMenu.style.left=px+'px';actionMenu.style.top=py+'px';
        requestAnimationFrame(()=>actionMenu.classList.add('show'));
      }

      document.addEventListener('click',(e)=>{if(!actionMenu.contains(e.target))hideMenu();});
      document.addEventListener('contextmenu',()=>hideMenu());

      actionMenu.addEventListener('click',(e)=>{
        const btn=e.target.closest('button');if(!btn)return;
        const type=btn.getAttribute('data-type');
        if(currentMenuMsgId&&type){
          const wrapper=msgArea.querySelector('[data-msg-id="'+currentMenuMsgId+'"]');
          if(wrapper){const bubble=wrapper.querySelector('.msg-bubble');if(bubble){let badge=bubble.querySelector('.badge-count');if(!badge){badge=document.createElement('span');badge.className='badge-count';bubble.appendChild(badge);}const cur=parseInt(badge.textContent)||0;badge.textContent=cur+1;if(cur+1>0)badge.classList.add('show');}}
          appendMessage({type:'system',content:'你轻轻给对方送上了一个'+(type==='like'?'点赞 👍':'抱抱 🫂')});
          try{socket.emit('msg-action',{msgId:currentMenuMsgId,type});}catch(er){}
        }
        hideMenu();
      });

      const SENSITIVE_WORDS=['操','吃屎','大便','傻逼','妈的','滚蛋','fuck','shit','damn'];
      function filterContent(text){let f=text;for(const w of SENSITIVE_WORDS){if(!w.trim())continue;const chars=w.split('');const fuzzy=chars.map(c=>c.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('[\\s.,;:!?\'"()（）\\[\\]{}|<>@#$%^&*+=_\\-~`\\\\/]*');f=f.replace(new RegExp(fuzzy,'gi'),'***');}return f;}

      // 原生 Emoji 面板
      const emojiBtn=document.getElementById('emojiBtn'),emojiPanel=document.getElementById('emojiPanel');
      emojiBtn.addEventListener('click',(e)=>{e.stopPropagation();emojiPanel.classList.toggle('show');});
      document.addEventListener('click',(e)=>{if(!emojiPanel.contains(e.target)&&e.target!==emojiBtn)emojiPanel.classList.remove('show');});
      emojiPanel.addEventListener('click',(e)=>{const it=e.target.closest('.emoji-item');if(!it)return;const em=it.textContent.trim(),s=msgInput.selectionStart,en=msgInput.selectionEnd;msgInput.value=msgInput.value.substring(0,s)+em+msgInput.value.substring(en);msgInput.selectionStart=msgInput.selectionEnd=s+em.length;msgInput.focus();});

      // 递咖啡
      document.getElementById('coffeeBtn').addEventListener('click',()=>{appendMessage({type:'system',content:'你为大家递出了一杯热咖啡 ☕'});try{socket.emit('global-coffee');}catch(er){}});

      let msgIdC=0;function genMsgId(){return'm-'+Date.now()+'-'+(++msgIdC)+'-'+Math.random().toString(36).slice(2,6);}

      const FLOWER_NAMES=['凌晨三点的猫','迷路的向日葵','宇宙边缘的宇航员','失眠的鲸鱼','月亮背面的兔子','深海里的萤火虫','第七次日落','北极星的眼泪','会飞的金鱼','雨中跳舞的刺猬','黄昏便利店','银河铁道乘务员','星尘收集者','樱花飘落的速度','风居住的街道','被遗忘的邮筒','云朵上的面包师','旧唱片里的杂音','半糖去冰的月亮','平行世界的另一个我'];
      let myNickname='';const socket=io();

      randomBtn.addEventListener('click',()=>{const n=FLOWER_NAMES[Math.floor(Math.random()*FLOWER_NAMES.length)];nicknameInput.value=n;nicknameInput.focus();nicknameInput.select();});
      function joinChat(){const raw=nicknameInput.value.trim();joinBtn.disabled=true;joinBtn.textContent='正在进入…';nicknameInput.disabled=true;try{socket.emit('join',{nickname:raw});}catch(er){}}
      joinBtn.addEventListener('click',joinChat);
      nicknameInput.addEventListener('keydown',(e)=>{if(e.key==='Enter'){e.preventDefault();joinChat();}});
      nicknameInput.focus();

      socket.on('welcome',(data)=>{myNickname=data.nickname;myNameEl.textContent=myNickname;onlineEl.textContent=data.usedCount;document.title=myNickname+' | 口袋树洞';nicknameOverlay.classList.add('fade-out');chatApp.classList.add('visible');setTimeout(()=>{try{nicknameOverlay.style.display='none';}catch(er){}},600);setTimeout(()=>msgInput.focus(),400);});
      socket.on('onlineCount',(data)=>{onlineEl.textContent=data.count;});
      socket.on('message',(msg)=>{appendMessage(msg);});

      function appendMessage(msg,prepend){
        const wrapper=document.createElement('div');wrapper.className='msg-wrapper'+(msg.type==='system'?' system':'');
        const isMe=msg.type==='chat'&&msg.nickname===myNickname;if(isMe)wrapper.classList.add('is-me');
        const msgId=msg.id||genMsgId();wrapper.setAttribute('data-msg-id',msgId);
        if(msg.type==='system'){wrapper.innerHTML='<div class="msg-bubble">'+escapeHtml(msg.content)+'</div>';}
        else{const dn=isMe?'你':escapeHtml(msg.nickname),total=(msg.likes||0)+(msg.hugs||0);wrapper.innerHTML='<div class="msg-meta"><span class="msg-nickname">'+dn+'</span><span class="msg-time">'+escapeHtml(msg.time)+'</span></div><div class="msg-bubble">'+escapeHtml(msg.content)+'<span class="badge-count'+(total>0?' show':'')+'">'+total+'</span></div>';}
        if(prepend)msgArea.insertBefore(wrapper,msgArea.firstChild);else msgArea.appendChild(wrapper);
        msgArea.scrollTop=msgArea.scrollHeight;
      }

      let longPressTimer=null;
      msgArea.addEventListener('contextmenu',(e)=>{const wrapper=e.target.closest('.msg-wrapper');if(!wrapper||wrapper.classList.contains('system'))return;e.preventDefault();hideMenu();const msgId=wrapper.getAttribute('data-msg-id');if(msgId)showMenu(e.clientX,e.clientY,msgId);});
      msgArea.addEventListener('touchstart',(e)=>{const wrapper=e.target.closest('.msg-wrapper');if(!wrapper||wrapper.classList.contains('system'))return;longPressTimer=setTimeout(()=>{const t=e.touches[0];hideMenu();const msgId=wrapper.getAttribute('data-msg-id');if(msgId)showMenu(t.clientX,t.clientY,msgId);},500);},{passive:true});
      msgArea.addEventListener('touchend',()=>{if(longPressTimer)clearTimeout(longPressTimer);});
      msgArea.addEventListener('touchmove',()=>{if(longPressTimer)clearTimeout(longPressTimer);});

      socket.on('msg-action-update',(data)=>{const wrapper=msgArea.querySelector('[data-msg-id="'+data.msgId+'"]');if(!wrapper)return;const bubble=wrapper.querySelector('.msg-bubble');if(!bubble)return;let badge=bubble.querySelector('.badge-count');if(!badge){badge=document.createElement('span');badge.className='badge-count';bubble.appendChild(badge);}const total=(parseInt(badge.textContent)||0)+1;badge.textContent=total;if(total>0)badge.classList.add('show');});
      socket.on('global-coffee',()=>{appendMessage({type:'system',content:'有人默默为全场递出了一杯热咖啡 ☕'});});

      // 发送消息时前端主动生成 msgId，确保所有客户端看到一致 ID
      function sendMessage(){
        const raw=msgInput.value.trim();if(!raw)return;
        const msgId=genMsgId();const content=filterContent(raw);
        try{socket.emit('chatMessage',{id:msgId,content});}catch(er){}
        msgInput.value='';msgInput.focus();
      }
      sendBtn.addEventListener('click',sendMessage);
      msgInput.addEventListener('keydown',(e)=>{if(e.key==='Enter'){e.preventDefault();sendMessage();}});
      function escapeHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    })();
  </script>
</body>
</html>
